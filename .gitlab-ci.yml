build_image:
  only:
    - tags
  tags:
    - ninavirus
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - echo "{\"auths\":{\"harbor.computational.bio.uni-giessen.de\":{\"username\":\"$HARBOR_USER\",\"password\":\"$HARBOR_PASSWORD\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor --cache=true --context $CI_PROJECT_DIR --dockerfile $CI_PROJECT_DIR/Dockerfile --destination harbor.computational.bio.uni-giessen.de/virusapp/server:$CI_COMMIT_TAG