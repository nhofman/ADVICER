apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: website
    app.kubernetes.io/part-of: ninavirus
    app.kubernetes.io/version: v1.9.4
  name: ninavirus
  namespace: ninavirus
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: website
      app.kubernetes.io/part-of: ninavirus
      app.kubernetes.io/version: v1.9.4
  template:
    metadata:
      labels:
        app.kubernetes.io/name: website
        app.kubernetes.io/part-of: ninavirus
        app.kubernetes.io/version: v1.9.4
    spec:
      initContainers:
        - image: harbor.computational.bio.uni-giessen.de/virusapp/datastager:1.0
          name: virus-data-stager
          env:
            - name: DataBasePath
              value: /data
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  key: AWS_ACCESS_KEY_ID
                  name: s3
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  key: AWS_SECRET_ACCESS_KEY
                  name: s3
          volumeMounts:
            - name: config
              mountPath: "/config"
              readOnly: true
            - name: data-staging-volume
              mountPath: "/data"
      containers:
        - image: harbor.computational.bio.uni-giessen.de/virusapp/server:1.9.3
          resources:
            requests:
              memory: "2048Mi"
              cpu: "2000m"
            limits:
              memory: "4096Mi"
              cpu: "3000m"
          env:
            - name: DataBasePath
              value: /data
          volumeMounts:
            - name: config
              mountPath: "/config"
              readOnly: true
            - name: data-staging-volume
              mountPath: "/data"
          name: virus-website
          ports:
            - containerPort: 8080
      volumes:
        - name: config
          configMap:
            name: virus-fileconfig
        - name: data-staging-volume
          emptyDir: {}
      imagePullSecrets:
        - name: harbor-giessen
---
apiVersion: v1
kind: Service
metadata:
  name: ninavirus
  namespace: ninavirus
spec:
  selector:
      app.kubernetes.io/name: website
      app.kubernetes.io/part-of: ninavirus
      app.kubernetes.io/version: v1.9.4
  ports:
    - protocol: TCP
      port: 3838
      targetPort: 3838
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ninavirus
  namespace: ninavirus
  annotations:
    kubernetes.io/ingress.class: "nginx"  
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: ninavirus-login-secret
    nginx.ingress.kubernetes.io/auth-realm: 'Authentication Required'
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "stickounet"
    nginx.ingress.kubernetes.io/session-cookie-expires: "172800"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "172800"
spec:
  rules:
  - host: virusapp.computational.bio
    http:
      paths:
        - pathType: Prefix
          path: "/"
          backend:
            service:
              name: ninavirus
              port:
                number: 3838
  tls: # < placing a host in the TLS config will indicate a certificate should be created
    - hosts:
      - virusapp.computational.bio
      secretName: ninavirus-secret # < cert-manager will store the created certificate in this secret.
---
